<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Funcionário - Vargas Pizzaria</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #000; color: white; text-align: center; margin: 0; padding: 20px; }

        /* Barra de Topo */
        .nav-topo { display: flex; justify-content: space-between; align-items: center; max-width: 500px; margin: 0 auto 30px auto; padding: 0 10px; }
        .btn-voltar { color: #888; text-decoration: underline; font-size: 13px; cursor: pointer; background: none; border: none; padding: 0; }
        .link-gerente { color: #888; text-decoration: underline; font-size: 13px; cursor: pointer; }

        /* Pop-ups (Modais) */
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); }

        /* Modal de Erro Customizado (Vermelho, Itálico) */
        .modal-content-erro { 
            background: #FF0000; 
            margin: 25% auto; 
            padding: 30px; 
            width: 280px; 
            border-radius: 20px; 
            position: relative;
            color: white;
        }
        .texto-negado { font-style: italic; font-weight: bold; font-size: 20px; margin-bottom: 15px; }

        .modal-content { background: #1a1a1a; margin: 25% auto; padding: 30px; border: 2px solid #E63946; width: 280px; border-radius: 20px; position: relative; }
        .btn-modal { padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; border: none; margin: 5px; }
        .btn-vermelho { background: #E63946; color: white; }
        .btn-erro-ok { background: white; color: red; border: none; padding: 10px 25px; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .btn-cinza { background: #444; color: white; }

        /* Estrutura de Abas */
        .aba-setor { width: 100%; max-width: 500px; margin: 12px auto; border-radius: 15px; overflow: hidden; border: 1px solid #333; }
        .aba-topo { padding: 20px; font-weight: bold; cursor: pointer; display: flex; justify-content: space-between; text-transform: uppercase; font-size: 14px; }
        .aba-conteudo { display: none; background: #111; padding: 20px; border-top: 1px solid #333; }

        /* Cores Setores */
        .c-1 { background: #E63946; } .c-2 { background: #FFB300; color: #000; } 
        .c-3 { background: #F3722C; }

        .btn-entrar { background: white; color: black; border: none; padding: 15px; width: 100%; border-radius: 10px; font-weight: bold; cursor: pointer; margin-bottom: 25px; font-size: 16px; }

        /* Grid de Funcionários */
        .equipe-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .card-func { background: #1a1a1a; border: 1px solid #222; display: flex; align-items: center; padding: 8px; border-radius: 10px; }
        .foto { width: 40px; height: 55px; background: #333; border-radius: 4px; margin-right: 10px; flex-shrink: 0; background-size: cover; background-position: center; }
        .info { text-align: left; overflow: hidden; }
        .nome { font-size: 11px; font-weight: bold; margin: 0; color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .idade { font-size: 10px; color: #666; margin-top: 2px; }

        /* Tela de Login */
        #tela-login { background: #1a1a1a; padding: 40px 20px; border-radius: 25px; border: 2px solid #E63946; max-width: 320px; margin: 80px auto; }
        .input-vargas { width: 100%; padding: 15px; margin: 10px 0; border-radius: 12px; border: 1px solid #333; background: #000; color: white; font-size: 16px; box-sizing: border-box; }
    </style>
</head>
<body>

    <div id="modal-sair" class="modal">
        <div class="modal-content">
            <h3 style="margin-top:0;">AVISO</h3>
            <p style="font-size: 14px; color: #bbb;">Se você sair, precisará logar novamente para acessar o portal.</p>
            <button class="btn-modal btn-vermelho" onclick="confirmarSair()">SAIR</button>
            <button class="btn-modal btn-cinza" onclick="fecharModalSair()">CANCELAR</button>
        </div>
    </div>

    <div id="modal-erro" class="modal">
        <div class="modal-content-erro">
            <div class="texto-negado">Acesso Negado</div>
            <p style="font-size: 14px; margin-bottom: 20px;">Você não tem permissão para entrar aqui.</p>
            <button class="btn-erro-ok" onclick="fecharModalErro()">OK</button>
        </div>
    </div>

    <div id="tela-login">
        <h2 style="color: #E63946; margin: 0 0 20px 0;">VARGAS PIZZARIA SYSTEM</h2>
        <input type="email" id="email" class="input-vargas" placeholder="E-mail">
        <input type="password" id="senha" class="input-vargas" placeholder="Senha">
        <button onclick="logar()" style="background:#E63946; color:white; border:none; padding:18px; width:100%; border-radius:12px; font-weight:bold; cursor:pointer; margin-top:10px;">ENTRAR</button>
    </div>

    <div id="portal" style="display:none;">
        <div class="nav-topo">
            <button class="btn-voltar" onclick="abrirModalSair()">Sair do Sistema</button>
            <span class="link-gerente" onclick="tentarAcessoRestrito()">⚙️ ADM</span>
        </div>

        <h1 style="color: #E63946;">PAINEL DA EQUIPE</h1>

        <div class="aba-setor">
            <div class="aba-topo c-1" onclick="toggle('setor-1')">💰 CAIXA <span>▼</span></div>
            <div id="setor-1" class="aba-conteudo">
                <button class="btn-entrar" onclick="tentarEntrarNoSetor('caixa')">ENTRAR NO CAIXA</button>
                <div id="grid-caixa" class="equipe-grid">
                    </div>
            </div>
        </div>

        <div class="aba-setor">
            <div class="aba-topo c-2" onclick="toggle('setor-2')">🤵 GARÇOM <span>▼</span></div>
            <div id="setor-2" class="aba-conteudo">
                <button class="btn-entrar" onclick="tentarEntrarNoSetor('garcon')">ENTRAR NO GARÇOM</button>
                <div id="grid-garcon" class="equipe-grid">
                    </div>
            </div>
        </div>

        <div class="aba-setor">
            <div class="aba-topo c-3" onclick="toggle('setor-3')">🍕 COZINHA <span>▼</span></div>
            <div id="setor-3" class="aba-conteudo">
                <button class="btn-entrar" onclick="tentarEntrarNoSetor('cozinha')">ENTRAR NA COZINHA</button>
                <div id="grid-cozinha" class="equipe-grid">
                    </div>
            </div>
        </div>
    </div>

    <script>
        // 🔌 FIAÇÃO DE EMERGÊNCIA (FUNCIONA MESMO SEM PLANILHA)
        const reserva = { 
            "admin@vargas.com": { senha: "123", nome: "Anthony (Dono)", cargo: "dono" } 
        };

        let usuarioLogado = null;

        function logar() {
            const e = document.getElementById('email').value; // RIGOROSO: Respeita Maiúsculas
            const s = document.getElementById('senha').value;

            // 1º Tenta o login de reserva (Dono)
            if(reserva[e] && reserva[e].senha === s) {
                sucessoLogin(reserva[e]);
                return;
            }

            // 2º Tenta a conexão com a Tomada (Planilha)
            try {
                google.script.run.withSuccessHandler(function(user) {
                    if(user) { sucessoLogin(user); } 
                    else { alert("E-mail ou Senha incorretos. Verifique as letras maiúsculas."); }
                }).verificarLogin(e, s);
            } catch(err) {
                alert("Modo Offline: Use o e-mail de reserva para entrar.");
            }
        }

        function sucessoLogin(dados) {
            usuarioLogado = dados;
            document.getElementById('tela-login').style.display = 'none';
            document.getElementById('portal').style.display = 'block';
            carregarEquipeDinamica(); // Tenta puxar os nomes da planilha
        }

        function carregarEquipeDinamica() {
            try {
                google.script.run.withSuccessHandler(function(lista) {
                    // Aqui o sistema desenha os cards dos funcionários da planilha
                }).buscarEquipePlanilha();
            } catch(e) { console.log("Aguardando conexão com a planilha para listar a equipe..."); }
        }

        // LÓGICA DE FERRO: CADA MACACO NO SEU GALHO
        function tentarEntrarNoSetor(setorBotao) {
            if(!usuarioLogado) return;

            // Dono tem acesso a tudo. Funcionário só ao seu cargo.
            if(usuarioLogado.cargo === setorBotao || usuarioLogado.cargo === 'dono') {
                alert("Acesso Autorizado! Abrindo painel...");
            } else {
                // DISPARA O MODAL VERMELHO EM ITÁLICO
                document.getElementById('modal-erro').style.display = 'block';
            }
        }

        function tentarAcessoRestrito() {
            if(usuarioLogado.cargo === 'dono' || usuarioLogado.cargo === 'gerente') {
                alert("Entrando no Painel Administrativo...");
            } else {
                document.getElementById('modal-erro').style.display = 'block';
            }
        }

        // FUNÇÕES DE INTERFACE
        function toggle(id) {
            const el = document.getElementById(id);
            const status = el.style.display;
            document.querySelectorAll('.aba-conteudo').forEach(a => a.style.display = 'none');
            el.style.display = (status === 'block') ? 'none' : 'block';
        }

        function abrirModalSair() { document.getElementById('modal-sair').style.display = 'block'; }
        function fecharModalSair() { document.getElementById('modal-sair').style.display = 'none'; }
        function confirmarSair() { window.location.reload(); }
        function fecharModalErro() { document.getElementById('modal-erro').style.display = 'none'; }
    </script>
</body>
</html>
